<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <style>
    @keyframes bloom {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Stage 1 — single center pixel */
    .s1 { animation: bloom 0.3s steps(1) 0s infinite alternate; }
    /* Stage 2 — small cross */
    .s2 { animation: bloom 0.3s steps(1) 0.3s infinite alternate; }
    /* Stage 3 — petals appear */
    .s3 { animation: bloom 0.3s steps(1) 0.6s infinite alternate; }
    /* Stage 4 — full bloom */
    .s4 { animation: bloom 0.3s steps(1) 0.9s infinite alternate; }
    /* Stage 5 — outer glow pixels */
    .s5 { animation: bloom 0.3s steps(1) 1.2s infinite alternate; }

    .s1, .s2, .s3, .s4, .s5 { opacity: 0; }
  </style>

  <!-- Background -->
  <rect width="16" height="16" fill="#0c0c0c"/>

  <!-- Stage 1: seed — center dot -->
  <g class="s1">
    <rect x="7" y="7" width="2" height="2" fill="#2a5a2a"/>
  </g>

  <!-- Stage 2: sprout — small cross -->
  <g class="s2">
    <rect x="7" y="7" width="2" height="2" fill="#00ff41"/>
    <rect x="7" y="5" width="2" height="2" fill="#2a5a2a"/>
    <rect x="7" y="9" width="2" height="2" fill="#2a5a2a"/>
    <rect x="5" y="7" width="2" height="2" fill="#2a5a2a"/>
    <rect x="9" y="7" width="2" height="2" fill="#2a5a2a"/>
  </g>

  <!-- Stage 3: bud — petals forming -->
  <g class="s3">
    <rect x="7" y="7" width="2" height="2" fill="#ffcc00"/>
    <rect x="7" y="4" width="2" height="3" fill="#c8364a"/>
    <rect x="7" y="9" width="2" height="3" fill="#c8364a"/>
    <rect x="4" y="7" width="3" height="2" fill="#c8364a"/>
    <rect x="9" y="7" width="3" height="2" fill="#c8364a"/>
    <rect x="5" y="5" width="2" height="2" fill="#c8364a"/>
    <rect x="9" y="5" width="2" height="2" fill="#c8364a"/>
    <rect x="5" y="9" width="2" height="2" fill="#c8364a"/>
    <rect x="9" y="9" width="2" height="2" fill="#c8364a"/>
    <!-- stem -->
    <rect x="7" y="12" width="2" height="2" fill="#2a5a2a"/>
    <rect x="6" y="13" width="1" height="1" fill="#2a5a2a"/>
  </g>

  <!-- Stage 4: full bloom -->
  <g class="s4">
    <!-- center -->
    <rect x="6" y="6" width="4" height="4" fill="#ffcc00"/>
    <!-- top petal -->
    <rect x="7" y="2" width="2" height="4" fill="#ff4466"/>
    <rect x="6" y="3" width="1" height="2" fill="#ff4466"/>
    <rect x="9" y="3" width="1" height="2" fill="#ff4466"/>
    <!-- bottom petal -->
    <rect x="7" y="10" width="2" height="4" fill="#ff4466"/>
    <rect x="6" y="11" width="1" height="2" fill="#ff4466"/>
    <rect x="9" y="11" width="1" height="2" fill="#ff4466"/>
    <!-- left petal -->
    <rect x="2" y="7" width="4" height="2" fill="#ff4466"/>
    <rect x="3" y="6" width="2" height="1" fill="#ff4466"/>
    <rect x="3" y="9" width="2" height="1" fill="#ff4466"/>
    <!-- right petal -->
    <rect x="10" y="7" width="4" height="2" fill="#ff4466"/>
    <rect x="11" y="6" width="2" height="1" fill="#ff4466"/>
    <rect x="11" y="9" width="2" height="1" fill="#ff4466"/>
    <!-- diagonal petals -->
    <rect x="4" y="4" width="2" height="2" fill="#ff6680"/>
    <rect x="10" y="4" width="2" height="2" fill="#ff6680"/>
    <rect x="4" y="10" width="2" height="2" fill="#ff6680"/>
    <rect x="10" y="10" width="2" height="2" fill="#ff6680"/>
    <!-- stem -->
    <rect x="7" y="14" width="2" height="2" fill="#2a5a2a"/>
    <rect x="5" y="14" width="2" height="1" fill="#2a5a2a"/>
  </g>

  <!-- Stage 5: glow — outer shimmer pixels -->
  <g class="s5">
    <!-- center -->
    <rect x="6" y="6" width="4" height="4" fill="#ffe566"/>
    <!-- top petal -->
    <rect x="7" y="1" width="2" height="5" fill="#ff2255"/>
    <rect x="6" y="2" width="1" height="3" fill="#ff2255"/>
    <rect x="9" y="2" width="1" height="3" fill="#ff2255"/>
    <rect x="5" y="3" width="1" height="1" fill="#ff4466"/>
    <rect x="10" y="3" width="1" height="1" fill="#ff4466"/>
    <!-- bottom petal -->
    <rect x="7" y="10" width="2" height="5" fill="#ff2255"/>
    <rect x="6" y="11" width="1" height="3" fill="#ff2255"/>
    <rect x="9" y="11" width="1" height="3" fill="#ff2255"/>
    <rect x="5" y="13" width="1" height="1" fill="#ff4466"/>
    <rect x="10" y="13" width="1" height="1" fill="#ff4466"/>
    <!-- left petal -->
    <rect x="1" y="7" width="5" height="2" fill="#ff2255"/>
    <rect x="2" y="6" width="3" height="1" fill="#ff2255"/>
    <rect x="2" y="9" width="3" height="1" fill="#ff2255"/>
    <!-- right petal -->
    <rect x="10" y="7" width="5" height="2" fill="#ff2255"/>
    <rect x="11" y="6" width="3" height="1" fill="#ff2255"/>
    <rect x="11" y="9" width="3" height="1" fill="#ff2255"/>
    <!-- diagonal petals -->
    <rect x="3" y="3" width="3" height="3" fill="#ff4466"/>
    <rect x="10" y="3" width="3" height="3" fill="#ff4466"/>
    <rect x="3" y="10" width="3" height="3" fill="#ff4466"/>
    <rect x="10" y="10" width="3" height="3" fill="#ff4466"/>
    <!-- outer shimmer -->
    <rect x="7" y="0" width="2" height="1" fill="#ff446655"/>
    <rect x="0" y="7" width="1" height="2" fill="#ff446655"/>
    <rect x="15" y="7" width="1" height="2" fill="#ff446655"/>
    <rect x="7" y="15" width="2" height="1" fill="#ff446644"/>
    <!-- stem -->
    <rect x="7" y="14" width="2" height="2" fill="#00ff41"/>
    <rect x="5" y="14" width="2" height="1" fill="#2a5a2a"/>
    <rect x="9" y="15" width="1" height="1" fill="#2a5a2a"/>
  </g>
</svg>
